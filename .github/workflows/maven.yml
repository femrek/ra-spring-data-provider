name: Java CI with Maven

on:
  push:
    branches: ["main"]
    tags:
      - "spring-v*"
  pull_request:
    branches: ["main"]

jobs:
  build-test-integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        working-directory: ra-spring-json-server
        run: mvn -B package --file pom.xml

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "ra-spring-data-provider/package-lock.json"

      # Install npm dependencies
      - name: Install npm dependencies
        working-directory: ra-spring-data-provider
        run: npm ci

      - name: Run integration test
        run: sh run-integration-tests.sh

  publish-to-maven-central:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: build-test-integration-test
    if: startsWith(github.ref, 'refs/tags/spring-v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Publish to Maven Central
        working-directory: ra-spring-json-server
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn --batch-mode deploy -P release -DskipTests
